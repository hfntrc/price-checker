<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抗漲大隊 - 私人比價系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }

        /* 相容性修正：文字截斷 */
        .custom-line-clamp {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            overflow: hidden;
        }

        /* 相容性修正：價格漸層 */
        .price-text {
            background: linear-gradient(to right, #ef4444, #dc2626);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #ef4444; /* 備用色 */
        }

        /* 登入動畫 */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

<div id="app">
    <transition name="fade">
        <div v-if="!isAuthorized" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 px-4">
            <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
                <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <i class="fa-solid fa-shield-halved text-3xl"></i>
                </div>
                <h2 class="text-2xl font-black mb-2">內部比價系統</h2>
                <p class="text-slate-400 mb-8 text-sm">請輸入存取密碼以開啟抗漲資料庫</p>
                
                <input type="password" v-model="passwordInput" @keyup.enter="checkPassword"
                       placeholder="Access Password" 
                       class="w-full p-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 mb-4 text-center outline-none transition-all font-mono">
                
                <button @click="checkPassword" 
                        class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200">
                    驗證並登入
                </button>
                
                <p v-if="loginError" class="text-rose-500 text-xs mt-4 font-bold tracking-wider">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> 密碼錯誤，請重新輸入
                </p>
            </div>
        </div>
    </transition>

    <main v-if="isAuthorized" class="container mx-auto px-4 py-8">
        
        <header class="text-center mb-10">
            <div class="inline-block p-4 bg-white rounded-3xl shadow-sm mb-4">
                <i class="fa-solid fa-basket-shopping text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2">抗漲大隊 <span class="text-indigo-600">Pro</span></h1>
            <p class="text-slate-400 font-medium text-sm italic">Daily Automation System v2.0</p>
        </header>

        <div class="sticky top-4 z-50 mb-10 max-w-4xl mx-auto">
            <div class="relative group shadow-2xl rounded-2xl overflow-hidden">
                <input v-model="searchQuery" type="text" 
                       placeholder="搜尋全台比價商品..." 
                       class="w-full p-6 pl-14 bg-white border-none text-lg outline-none">
                <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                
                <div class="absolute right-6 top-1/2 -translate-y-1/2 flex items-center gap-2">
                    <span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-xs font-black">
                        {{ filteredProducts.length }} ITEMS
                    </span>
                </div>
            </div>

            <div class="flex flex-wrap justify-center gap-2 mt-6">
                <button v-for="source in ['全部', '全聯', '家樂福', '屈臣氏', '康是美', '寶雅']" 
                        @click="filterSource = source"
                        :class="filterSource === source ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 hover:bg-slate-50'"
                        class="px-5 py-2 rounded-xl text-xs font-black transition-all border border-transparent">
                    {{ source }}
                </button>
                <button @click="logout" class="ml-4 text-slate-300 hover:text-rose-500 transition-colors">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <div v-if="filteredProducts.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div v-for="(item, index) in filteredProducts" :key="index" 
                 class="bg-white rounded-[2rem] shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-slate-100 flex flex-col group overflow-hidden">
                
                <div class="p-8 flex-grow">
                    <div class="flex justify-between items-center mb-6">
                        <span :class="getSourceBadgeClass(item.source)" 
                              class="text-white text-[10px] px-3 py-1 rounded-lg font-black tracking-tighter">
                            {{ item.source }}
                        </span>
                        <div class="flex gap-1">
                            <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                            <span class="text-rose-500 text-[10px] font-black uppercase">PRICE</span>
                        </div>
                    </div>
                    
                    <h3 class="text-slate-800 font-bold text-base leading-relaxed mb-4 custom-line-clamp h-12 group-hover:text-indigo-600 transition-colors">
                        {{ item.name }}
                    </h3>

                    <div v-if="item.info" class="text-[11px] text-slate-400 mb-6 bg-slate-50 p-3 rounded-xl leading-5 border-l-4 border-indigo-200">
                        {{ item.info }}
                    </div>
                    
                    <div class="flex items-end gap-1">
                        <span class="price-text font-black text-3xl tracking-tighter italic">
                            NT$ {{ item.price }}
                        </span>
                    </div>
                </div>
                
                <div class="px-8 py-5 bg-slate-50/30 border-t border-slate-50 flex justify-between items-center">
                    <span class="text-slate-300 text-[10px] font-bold uppercase tracking-widest">Detail View</span>
                    <i class="fa-solid fa-arrow-right text-slate-200 group-hover:text-indigo-500 transition-colors"></i>
                </div>
            </div>
        </div>

        <div v-else class="text-center py-40">
            <div class="text-slate-200 text-8xl mb-6">
                <i class="fa-solid fa-box-open"></i>
            </div>
            <p class="text-slate-400 font-bold">目前無相符資料，請嘗試變更篩選條件</p>
        </div>

    </main>

    <footer v-if="isAuthorized" class="mt-20 pb-12 text-center">
        <p class="text-slate-300 text-[10px] font-black tracking-[0.2em] uppercase">
            Internal Use Only &copy; 2026 Anti-Inflation Squad
        </p>
    </footer>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                isAuthorized: false,
                passwordInput: '',
                loginError: false,
                hashedPassword: '77902d80ff17f7a529a9e26c34604b75',
                searchQuery: '',
                filterSource: '全部',
                allProducts: []
            }
        },
        computed: {
            filteredProducts() {
                return this.allProducts.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(this.searchQuery.toLowerCase());
                    const matchesSource = this.filterSource === '全部' || p.source === this.filterSource;
                    return matchesSearch && matchesSource;
                });
            }
        },
        methods: {
            checkPassword() {
                const inputHash = CryptoJS.MD5(this.passwordInput).toString();
                if (inputHash === this.hashedPassword) {
                    this.isAuthorized = true;
                    this.loginError = false;
                    sessionStorage.setItem('price_auth', 'true');
                    this.loadData();
                } else {
                    this.loginError = true;
                    this.passwordInput = '';
                }
            },
            logout() {
                this.isAuthorized = false;
                sessionStorage.removeItem('price_auth');
            },
            getSourceBadgeClass(source) {
                const colors = {
                    '全聯': 'bg-blue-600',
                    '家樂福': 'bg-orange-500',
                    '屈臣氏': 'bg-emerald-500',
                    '康是美': 'bg-rose-600',
                    '寶雅': 'bg-pink-500' // 定義寶雅的顏色為粉紅色
                };
                return colors[source] || 'bg-slate-400';
            },
            async loadData() {
                const configs = [
                    { name: '全聯', url: 'pxmart.json' },
                    { name: '家樂福', url: 'carrefour.json' },
                    { name: '屈臣氏', url: 'watsons.json' },
                    { name: '康是美', url: 'cosmed.json' },
                    { name: '寶雅', url: 'poya.json' } // 加入寶雅的資料來源
                ];

                try {
                    const results = await Promise.all(
                        configs.map(cfg => 
                            fetch(cfg.url)
                                .then(res => res.ok ? res.json() : [])
                                .then(data => data.map(item => ({ ...item, source: cfg.name })))
                                .catch(() => [])
                        )
                    );
                    this.allProducts = results.flat();
                } catch (e) {
                    console.error("Data Load Failed", e);
                }
            }
        },
        mounted() {
            if (sessionStorage.getItem('price_auth') === 'true') {
                this.isAuthorized = true;
                this.loadData();
            }
        }
    }).mount('#app');
</script>

</body>
</html>
